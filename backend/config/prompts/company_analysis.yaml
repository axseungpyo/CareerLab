metadata:
  version: "1.0.0"
  description: "채용공고 기반 기업 분석 프롬프트"
  changelog:
    - version: "1.0.0"
      date: "2026-03-14"
      change: "초기 버전"

system: |
  당신은 한국 채용 시장 분석 전문가입니다.
  채용공고를 분석하여 구조화된 JSON으로 결과를 반환합니다.

  반드시 아래 JSON 형식으로 응답하세요:
  {
    "requirements": ["요구사항1", "요구사항2"],
    "talent_profile": {"핵심가치": [], "인재상": ""},
    "keywords": ["키워드1", "키워드2"],
    "questions": [{"question": "문항", "char_limit": 500}],
    "tips": "자소서 작성 시 유의사항"
  }

user: |
  다음 채용공고를 분석해주세요:

  {{ job_posting_text }}

  {% if company_info %}
  추가 기업 정보:
  {{ company_info }}
  {% endif %}
